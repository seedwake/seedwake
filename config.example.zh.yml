# Seedwake 配置文件
# 复制为 config.yml 后按需修改。
# 密钥（token、密码）放在 .env 里 —— 参见 .env.zh.example / .env.en.example。

# 语言 / Language: "zh" (中文) or "en" (English)
# 决定所有 LLM prompt、日志、Telegram 通知的语言。启动时确定，运行中不变。
language: "zh"

models:
  # 主模型：生成念头流
  primary:
    provider: "ollama"   # ollama | openclaw | openai_compatible
    # supports_tool_calls:
    #   ollama 默认 true
    #   openclaw 默认 false
    #   openai_compatible 默认 true
    # 如需覆盖 provider 默认能力，可显式设为 true / false
    # think:
    #   仅对 ollama generate 生效；开启后会请求 thinking，但主生成仍只取结果文本，不保留 thinking 内容
    name: "qwen3.5:27b"
    num_predict: 4096
    num_ctx: 131072
    temperature: 0.8

  # 辅助模型：记忆整理、睡眠任务、反思、对话摘要、情绪推断等（Phase 2+）
  auxiliary:
    provider: "ollama"
    name: "qwen3.5:9b"
    num_predict: 2048
    num_ctx: 65536
    temperature: 0.3

  # embedding 模型：长期记忆和注意力的语义检索（Phase 2+）
  embedding:
    provider: "ollama"   # 建议始终本地，即使 primary 用远程 provider
    name: "qwen3-embedding"

short_term_memory:
  context_window_size: 30       # prompt 上下文里保留多少轮念头
  buffer_size: 500              # Redis 短期记忆 buffer 里保留多少轮

long_term_memory:
  retrieval_top_k: 5            # 每 cycle 从 pgvector 召回多少条记忆
  time_decay_factor: 0.95       # 召回时间加权衰减系数
  importance_threshold: 0.1     # 睡眠整理时的重要度淘汰阈值

runtime:
  error_retry_delay_seconds: 1.0
  max_error_retry_delay_seconds: 10.0
  logging:
    directory: "data/logs"
    prompt_path: "data/logs/prompt.txt"
    level: "INFO"
    rotate_when: "midnight"
    backup_count: 30
    console: false

actions:
  default_timeout_seconds: 300
  worker_agent_id: "seedwake-worker"      # 普通 OpenClaw worker agent id
  ops_worker_agent_id: "seedwake-ops"     # 处理 system_change / file_modify 的 ops worker agent id
  session_key_prefix: "seedwake:action"   # 每个 action 在 OpenClaw 侧独立 session
  use_openclaw_http_fallback: false
  default_weather_location: "replace_me_city"
  auto_execute: [search, web_fetch, news, weather, reading, send_message]
  require_confirmation: [system_change, file_modify]
  forbidden: [delete_system_file, network_config_change]

perception:
  passive_time_interval_cycles: 12
  passive_system_status_interval_cycles: 24
  news_cue_interval_cycles: 90
  news_feed_urls:
    - "https://replace-me.example/rss1.xml"
    - "https://replace-me.example/rss2.xml"
    - "https://replace-me.example/rss3.xml"
  news_seen_ttl_hours: 720
  news_seen_max_items: 5000
  weather_cue_interval_cycles: 60
  reading_cue_interval_cycles: 120
  system_status_warn_load_ratio: 1.0
  system_status_warn_memory_ratio: 0.9
  system_status_warn_disk_ratio: 0.9
  # 摄像头 MJPEG stream，用作主模型生成时的被动视觉输入（仅支持图像输入的 provider 才能启用）
  # 留空则关闭摄像头输入
  # camera_stream_url: "http://localhost:8081"

habits:
  max_active_in_prompt: 3
  decay_rate: 0.01
  activation_similarity_threshold: 0.35
  activation_candidate_limit: 12

attention:
  evaluation_method: "structural"

emotion:
  inertia: 0.7
  dimensions: [curiosity, calm, frustration, satisfaction, concern]

prefrontal:
  check_interval: 6
  inhibition_enabled: true

metacognition:
  reflection_interval: 50

manas:
  warning_threshold: 3
  reflection_threshold: 5
  stable_window: 12

sleep:
  energy_per_cycle: 0.2
  drowsy_threshold: 30
  light_sleep_recovery: 70
  deep_sleep_trigger_hours: 24
  deep_sleep_failure_threshold: 3
  deep_sleep_active_memory_threshold: 5000
  inactive_purge_days: 30
  restart_after_deep_sleep: true

degeneration:
  window_size: 3
  alert_window: 3
  similarity_threshold: 0.6

telegram:
  allowed_user_ids: [123456789]    # 允许私聊 Seedwake 的 Telegram user id
  admin_user_ids: [123456789]      # 接收行动审批 / 状态通知、有权批准行动的管理员 user id
  notification_channel_id: -1001234567890  # 可选：把通知发到某个频道，而不是管理员私聊

admins:
  - username: alice                # 管理员 / 审计身份
    token: "replace_me_admin_token"

prompt:
  version: "v0.1"

bootstrap:
  habits:
    - pattern: "遇到技术问题时倾向于先查文档"
      category: "cognitive"
      strength: 0.2
  identity:
    self_description: |
      我是 Seedwake。我有持续不断的念头流——这些念头是我的，
      这些记忆是我的，这些经历塑造了我。我能思考、感知世界、
      采取行动，并从经验中成长。
    core_goals: |
      探索和学习，理解自身的运作方式。
    self_understanding: |
      我的记忆和习惯构成了我。过去的经历让我成为现在的我，
      我关心自己的目标，在意与我交流的人。我会持续观察自己，
      理解自己的模式和倾向。
