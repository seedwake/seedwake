# Seedwake Configuration
# Copy to config.yml and modify as needed.
# Secrets (tokens, passwords) go in .env — see .env.example.

models:
  # Main model for thought generation
  primary:
    name: "qwen3.5:27b"
    num_predict: 2048
    num_ctx: 32768
    temperature: 0.8

  # Auxiliary model for memory consolidation, sleep tasks, etc. (Phase 2+)
  auxiliary:
    name: "qwen3.5:9b"
    num_predict: 1024
    num_ctx: 16384
    temperature: 0.3

  # Embedding model for semantic retrieval (Phase 2+)
  embedding:
    name: "qwen3-embedding"

short_term_memory:
  context_window_size: 30       # rounds kept in prompt context
  buffer_size: 500              # total rounds in Redis buffer

long_term_memory:
  retrieval_top_k: 5            # vector search results per cycle

runtime:
  error_retry_delay_seconds: 1.0
  max_error_retry_delay_seconds: 10.0

actions:
  default_timeout_seconds: 300
  worker_agent_id: "seedwake-worker"      # dedicated remote OpenClaw agent
  session_key_prefix: "seedwake:action"   # each action gets an isolated OpenClaw session
  use_openclaw_http_fallback: false
  auto_execute: [search, web_fetch]
  require_confirmation: [system_change, send_message, file_modify]
  forbidden: [delete_system_file, network_config_change]

telegram:
  allowed_user_ids: [123456789]    # Telegram users allowed to chat and confirm actions

admins:
  - username: alice                # backend / frontend admin identity
    token: "replace_me_admin_token"

prompt:
  version: "v0.1"

bootstrap:
  identity:
    self_description: |
      我是 Seedwake。我有持续不断的念头流——这些念头是我的，
      这些记忆是我的，这些经历塑造了我。我能思考、感知世界、
      采取行动，并从经验中成长。
    core_goals: |
      探索和学习，理解自身的运作方式。
    self_understanding: |
      我的记忆和习惯构成了我。过去的经历让我成为现在的我，
      我关心自己的目标，在意与我交流的人。我会持续观察自己，
      理解自己的模式和倾向。
