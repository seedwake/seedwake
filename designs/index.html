<body class="waking">
  <!-- mode-dependent backdrop overlay -->
  <div class="mode-bloom" aria-hidden="true"></div>

  <!-- SVG filter: irregular seal-edge bite -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="seal-bite" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" />
      <feDisplacementMap in="SourceGraphic" scale="1.6" />
    </filter>
  </svg>

  <div id="root"></div>

  <script src="thoughts-data.js"></script>
  <script type="text/babel" src="left-panel.jsx"></script>
  <script type="text/babel" src="stream-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
